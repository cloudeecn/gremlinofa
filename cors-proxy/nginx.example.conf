# GremlinOFA nginx config
# Serves frontend, proxies storage backend and CORS proxy.
# Vibe-coded but battle-ready.

server {
    listen 80;
    server_name _;

    # Frontend static files (Vite build output)
    location / {
        root /opt/gremlinofa-frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite hashes filenames)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # CORS proxy — the whole reason this file exists
    location /cors-proxy/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;

        # SSE streaming: these three lines are non-negotiable
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Don't let nginx inject hop-by-hop headers
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI responses can take a while, especially with reasoning models
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Storage backend
    location /storage/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Backup uploads can be chunky
        client_max_body_size 100m;
    }
}
